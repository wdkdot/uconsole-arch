name: Build kernel packages

on:
  push:
    branches:
      - main
    paths:
      - "pkgs/linux-uconsole-cm5-git/**"
      - "pkgs/linux-uconsole-cm4-git/**"
      - "scripts/build-kernel-packages.sh"
      - ".github/workflows/build-kernel-packages.yml"

  workflow_dispatch:

concurrency:
  group: uconsole-arch-kernel-package-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, linux, X64]
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show build environment
        run: |
          uname -a
          whoami
          df -h
          aarch64-linux-gnu-gcc --version
          repo-add --version

      - name: Build kernel packages
        run: |
          ./scripts/build-kernel-packages.sh

      - name: Create pacman repository
        run: |
          rm -rf output/repo/aarch64
          mkdir -p output/repo/aarch64

          rsync -avh arch-mirror:/srv/uconsole-arch/aarch64/*.pkg.tar.zst output/repo/aarch64/ || true

          cp output/pkgs/*.pkg.tar.zst output/repo/aarch64/

          keep_latest_two() {
            pattern="$1"

            files="$(ls -1t $pattern 2>/dev/null || true)"

            if [ -n "$files" ]; then
              echo "$files" | tail -n +3 | xargs -r rm -f
            fi
          }

          keep_latest_two "output/repo/aarch64/linux-uconsole-cm5-git-*.pkg.tar.zst"
          keep_latest_two "output/repo/aarch64/linux-uconsole-cm4-git-*.pkg.tar.zst"

          cd output/repo/aarch64
          rm -f uconsole-arch.db* uconsole-arch.files*
          repo-add uconsole-arch.db.tar.zst *.pkg.tar.zst

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uconsole-arch-kernel-packages
          path: output/pkgs/*.pkg.tar.zst
          retention-days: 14

      - name: Upload pacman repo artifact
        uses: actions/upload-artifact@v4
        with:
          name: uconsole-arch-repo-aarch64
          path: output/repo/aarch64/**
          retention-days: 14

      - name: Publish pacman repository to arch-mirror
        if: github.ref == 'refs/heads/main'
        run: |
          rsync -avh --delete output/repo/aarch64/ \
            arch-mirror:/srv/uconsole-arch/aarch64/
